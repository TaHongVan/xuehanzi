version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hanzii-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hanzii-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hanzii-db-init
    volumes:
      - ./sql:/sql:ro
    command: >
      /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd
      -S sqlserver -U sa -P 'YourStrong@Passw0rd' -C
      -i /sql/00_create_database.sql"
    depends_on:
      sqlserver:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hanzii-backend
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: ${DB_NAME:-hanzii_db}
      DB_USERNAME: sa
      DB_PASSWORD: "YourStrong@Passw0rd"
      SPRING_PROFILES_ACTIVE: docker
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "hanzii-super-secret-key-change-in-production-min-256-bits-long!!"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hanzii-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlserver_data:
  redis_data:
