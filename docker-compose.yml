services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hanzii-sqlserver
    env_file:
      - path: .env
        required: false
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hanzii-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hanzii-db-init
    env_file:
      - path: .env
        required: false
    volumes:
      - ./sql:/sql:ro
    command: >
      /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd
      -S sqlserver -U sa -P '$${DB_PASSWORD}' -C
      -i /sql/00_create_database.sql"
    depends_on:
      sqlserver:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hanzii-backend
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: ${DB_NAME:-hanzii_db}
      DB_USERNAME: ${DB_USERNAME:-sa}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      SPRING_PROFILES_ACTIVE: docker
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hanzii-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlserver_data:
  redis_data:
